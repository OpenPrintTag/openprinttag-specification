- key: 0
  name: consumed_weight
  type: number
  unit: g
  description:
    - Amount of material that was used up from the container.
    - "`remaining_weight` = `instance_netto_full_weight` - `consumed_weight`"

- key: 1
  name: workgroup
  type: string
  max_length: 8
  description:
    - Workgroup identifier, used for detecting first usage of the material.
    - See the _write protection_ section.

- key: 2
  name: general_purpose_range_user
  type: string
  example: Prusa
  max_length: 8
  description:
    - Determines semantics of the fields in the general purpose key range.
    - "MUST be filled if any of the general purpose keys is used."
    - See _Vendor-specific fields_.

- key: 3
  name: last_stir_time
  category: sla
  type: timestamp
  description:
    - Timestamp when the resin was last stirred.
    - Resins that have not been used for some time should be stirred before printing.

- key: 4
  name: purchase_time
  type: timestamp
  category: user_data
  description:
    - Timestamp when the material package was purchased by the customer.
    - Not filled by the manufacturer, for customer private tracking only.

- key: 5
  name: purchase_price
  type: number
  category: user_data
  description:
    - Amount (of `purchase_currency`) the user paid for the material package.
    - Not filled by the manufacturer, for customer private tracking only.

- key: 6
  name: purchase_currency
  type: string
  max_length: 3
  category: user_data
  description:
    - Currency of `purchase_price`.
    - Alphabetic code according to [ISO 4271](https://en.wikipedia.org/wiki/ISO_4217).
    - Not filled by the manufacturer, for customer private tracking only.
